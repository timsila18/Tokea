name: tokea
description: Tokea premium Kenyan event discovery, management, and ticketing foundation.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  flutter_dotenv: 5.1.0
  go_router: 14.2.7
  google_fonts: 6.2.1
  intl: 0.19.0
  shared_preferences: 2.3.2
  supabase_flutter: 2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo/
